    <!--<label for="datasetSelect">Choose dataset:</label> -->
    <select id="datasetSelect">
      <option value="">-- Select index --</option>

      id="userInput"

      rows="10"
      cols="50"
    ></textarea>
    <select id="queryOptions">
        <option value="">-- Select a query --</option>
        <option value="1">Select all persons (house)</option>
        <option value="2">Select all persons and show their names and jobtitles (house)</option>
        <option value="3">Select all persons who know Gregory House (house)</option>
        <option value="4">Find all objects that end with /g (IRI)</option>
        <option value="5">Find all objects with an '?' (IRI)</option>
        <option value="6">Find all objects that contain a '#' (IRI)</option>
        <option value="7">List all characters and their full names</option>
        <option value="8">Find all characters who know Sheldon Cooper</option>
        <option value="9">Find all pairs of characters who know each other</option>
